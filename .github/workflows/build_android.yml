name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/build_android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi

      - name: Configure Android network permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Inject internet permission and network config if missing
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i 's|</manifest>||' "$MANIFEST"
            cat >> "$MANIFEST" << 'PERMEOF'

    <!-- Network permissions -->
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
</manifest>
PERMEOF
          fi
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hrecos-dashboard-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## Android APK Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- App ID: \`com.hrecos.dashboard\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- APK path: \`frontend/android/app/build/outputs/apk/debug/app-debug.apk\`" >> "$GITHUB_STEP_SUMMARY"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "APK listing not available" >> "$GITHUB_STEP_SUMMARY"
