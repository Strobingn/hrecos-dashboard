name: CI - Test & Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort bandit pytest pytest-asyncio
        
    - name: Lint with flake8
      working-directory: ./backend
      run: |
        # Stop on syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Check code formatting with black
      working-directory: ./backend
      run: |
        black --check --diff app || true
        
    - name: Check import sorting with isort
      working-directory: ./backend
      run: |
        isort --check-only --diff app || true
        
    - name: Security scan with bandit
      working-directory: ./backend
      run: |
        bandit -r app -f json -o bandit-report.json || true
        bandit -r app || true
        
    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: backend/bandit-report.json

  docker-build-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build backend image
      uses: docker/build-push-action@v7
      with:
        context: ./backend
        push: false
        load: true
        tags: hrecos-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test backend container
      run: |
        docker run --rm -d --name test-backend -p 8000:8000 hrecos-backend:test
        sleep 10
        curl -f http://localhost:8000/health || exit 1
        docker stop test-backend
        
    - name: Build frontend image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker-compose.yml
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
