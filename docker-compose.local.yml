version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: hrecos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:localpassword@db:5432/hrecos
      SECRET_KEY: local-development-secret-key
      EMAIL_ENABLED: "false"
      SMS_ENABLED: "false"
      SLACK_ENABLED: "false"
    ports:
      - "18080:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "18081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
